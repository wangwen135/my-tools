<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 阅读器</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
          rel="stylesheet">

    <!-- Markdown & Highlight -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
          id="hljs-theme">

    <style>
        :root {
            --bg: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --fg: #0f172a;
            --fg-muted: #64748b;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --accent-light: rgba(14, 165, 233, 0.1);
            --border: #e2e8f0;
            --code-bg: #1e293b;
            --blockquote-border: #0ea5e9;
            --link-color: #000;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.08);
            --radius: 10px;
            --toc-width: 280px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --fg: #f1f5f9;
            --fg-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --accent-light: rgba(56, 189, 248, 0.1);
            --border: #334155;
            --code-bg: #0f172a;
            --blockquote-border: #38bdf8;
            --link-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.8;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(12px);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .file-group {
            display: flex;
            align-items: center;
        }

        .file-group:not(.has-file) .open-file-btn {
            border-radius: var(--radius);
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            color: var(--fg);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
        }

        .logo svg {
            width: 42px;
            height: 42px;
            color: var(--accent);
        }

        .open-file-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: var(--radius) 0 0 var(--radius);
            cursor: pointer;
            color: var(--fg-muted);
            font-size: 13px;
            line-height: normal;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .open-file-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .open-file-btn svg {
            width: 16px;
            height: 16px;
        }

        .open-file-btn .btn-text {
            display: inline;
        }

        .open-file-btn.icon-only {
            padding: 0 10px;
        }

        .open-file-btn.icon-only .btn-text {
            display: none;
        }

        .file-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--fg-muted);
            height: 36px;
            padding: 0 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: none;
            border-right: none;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            align-content: center;
            line-height: normal;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: 0 var(--radius) var(--radius) 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .download-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .download-btn svg {
            width: 16px;
            height: 16px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-muted);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Width Selector */
        .width-selector {
            position: relative;
        }

        .width-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-muted);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .width-btn:hover, .width-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .width-btn svg {
            width: 20px;
            height: 20px;
        }

        .width-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            min-width: 140px;
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .width-dropdown.show {
            display: block;
            animation: fadeIn 0.15s ease;
        }

        .width-option {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--fg);
            transition: background 0.15s ease;
        }

        .width-option:hover {
            background: var(--accent-light);
        }

        .width-option.active {
            color: var(--accent);
            background: var(--accent-light);
        }

        .width-option .icon {
            display: flex;
            gap: 4px;
        }

        .width-option .icon span {
            display: block;
            height: 2px;
            background: currentColor;
        }

        .width-option .icon.narrow span {
            width: 8px;
        }

        .width-option .icon.medium span {
            width: 12px;
        }

        .width-option .icon.wide span {
            width: 18px;
        }

        .width-option .icon.wider span {
            width: 24px;
        }

        .width-option .icon.full span {
            width: 32px;
        }

        .width-option .label {
            margin-left: 12px;
            font-size: 13px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            height: 3px;
            background: var(--accent);
            z-index: 101;
            width: 0%;
            transition: width 0.1s ease-out;
        }

        /* Layout */
        .layout {
            display: flex;
            width: 100%;
            padding-top: 60px;
        }

        /* TOC Sidebar */
        .toc-sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            width: var(--toc-width);
            height: calc(100vh - 60px);
            padding: 12px 24px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            background: var(--bg);
            transform: translateX(0);
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
            z-index: 50;
        }

        .toc-sidebar.hidden {
            transform: translateX(-100%);
        }

        .toc-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            margin-bottom: 16px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 4px;
        }

        .toc-link {
            display: block;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--fg-muted);
            text-decoration: none;
            border-radius: 6px;
            border-left: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .toc-link:hover {
            color: var(--fg);
            background: var(--bg-secondary);
        }

        .toc-link.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: var(--accent-light);
        }

        .toc-link[data-level="2"] {
            padding-left: 12px;
        }

        .toc-link[data-level="3"] {
            padding-left: 24px;
            font-size: 13px;
        }

        .toc-link[data-level="4"] {
            padding-left: 36px;
            font-size: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--toc-width);
            padding: 48px;
            min-height: calc(100vh - 60px);
            transition: margin-left 0.3s ease;
        }

        .main-content.full-width {
            margin-left: 0;
        }

        .article {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 48px 64px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease, max-width 0.3s ease, padding 0.3s ease;
        }

        /* Article Width Variants */
        .article.width-narrow {
            max-width: 600px;
            padding: 48px 48px;
        }

        .article.width-medium {
            max-width: 800px;
            padding: 48px 64px;
        }

        .article.width-wide {
            max-width: 1000px;
            padding: 48px 80px;
        }

        .article.width-wider {
            max-width: 1200px;
            padding: 48px 96px;
        }

        .article.width-full {
            max-width: 100%;
            padding: 48px 24px;
        }

        /* Allow wider content for wider/full modes */
        .main-content .article.width-wider,
        .main-content .article.width-full {
            width: 100%;
        }

        /* Markdown Styles */
        .article h1, .article h2, .article h3, .article h4, .article h5, .article h6 {
            font-weight: 700;
            line-height: 1.3;
            margin-top: 2em;
            margin-bottom: 0.5em;
            color: var(--fg);
        }

        .article h1:first-child, .article h2:first-child, .article h3:first-child {
            margin-top: 0;
        }

        .article h1 {
            font-size: 2.25em;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.3em;
        }

        .article h2 {
            font-size: 1.75em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.2em;
        }

        .article h3 {
            font-size: 1.4em;
        }

        .article h4 {
            font-size: 1.2em;
        }

        .article p {
            margin-bottom: 1.2em;
        }

        .article a {
            color: var(--link-color);
            text-decoration: none;
            /*border-bottom: 1px solid transparent;*/
            transition: border-color 0.2s ease;
        }

        .article a:hover {
            border-bottom-color: var(--link-color);
        }

        .article strong {
            font-weight: 700;
            color: var(--fg);
        }

        .article em {
            font-style: italic;
        }

        .article blockquote {
            margin: 1.5em 0;
            padding: 1em 1.5em;
            border-left: 4px solid var(--blockquote-border);
            background: var(--bg);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--fg-muted);
        }

        .article blockquote p:last-child {
            margin-bottom: 0;
        }

        .article ul, .article ol {
            margin-bottom: 1.2em;
            padding-left: 1.5em;
        }

        .article li {
            margin-bottom: 0.4em;
        }

        .article li > ul, .article li > ol {
            margin-top: 0.4em;
            margin-bottom: 0.4em;
        }

        .article hr {
            border: none;
            height: 2px;
            background: var(--border);
            margin: 3em 0;
        }

        /* Code */
        .article code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }

        .article pre {
            margin: 1.5em 0;
            padding: 20px;
            background: var(--code-bg);
            border-radius: var(--radius);
            overflow-x: auto;
            position: relative;
        }

        .article pre code {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
        }

        .article :not(pre) > code {
            padding: 3px 8px;
            background: var(--bg);
            border-radius: 4px;
            color: var(--accent);
            font-weight: 500;
        }

        /* Tables */
        .article table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 0.95em;
        }

        .article th, .article td {
            padding: 12px 16px;
            text-align: left;
            border: 1px solid var(--border);
        }

        .article th {
            font-weight: 600;
            background: var(--bg);
        }

        .article tr:hover td {
            background: var(--bg);
        }

        /* Images */
        .article img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 1.5em 0;
        }

        /* Back to Top */
        .back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
            z-index: 90;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .back-to-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        .back-to-top svg {
            width: 24px;
            height: 24px;
        }

        /* Loading */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 24px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--fg-muted);
            font-size: 14px;
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 64px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            color: #ef4444;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .error-message {
            color: var(--fg-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
            margin-top: 16px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            color: var(--fg-muted);
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.25em;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--fg);
        }

        .empty-desc {
            color: var(--fg-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .empty-desc code {
            padding: 3px 8px;
            background: var(--bg);
            border-radius: 4px;
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 13px;
        }

        .example-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border-radius: var(--radius);
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .example-link:hover {
            background: var(--accent-hover);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .toc-sidebar {
                transform: translateX(-100%);
            }

            .toc-sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .article {
                padding: 32px;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 0 16px;
            }

            .file-path {
                display: none;
            }

            .main-content {
                padding: 24px 16px;
            }

            .article {
                padding: 24px;
            }

            .article h1 {
                font-size: 1.75em;
            }

            .article h2 {
                font-size: 1.4em;
            }

            .article h3 {
                font-size: 1.2em;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            html {
                scroll-behavior: auto;
            }
        }

        /* TOC Overlay */
        .toc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .toc-overlay.visible {
            display: block;
            opacity: 1;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.visible {
            display: block;
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 201;
            min-width: 400px;
            max-width: 90vw;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            flex-direction: column;
        }

        .modal.visible {
            display: flex;
        }

        .modal.visible {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--fg);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-muted);
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--bg);
            color: var(--fg);
        }

        .modal-close svg {
            width: 18px;
            height: 18px;
        }

        .modal-body {
            padding: 4px 24px 24px 24px;
            flex: 1;
            overflow-y: auto;
            min-height: 230px;
        }

        /* File selection tabs */
        .file-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .file-tab {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--fg-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .file-tab:hover {
            color: var(--fg);
        }

        .file-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .file-tab-content {
            display: none;
        }

        .file-tab-content.active {
            display: block;
        }

        .local-file-btn {
            width: 100%;
            padding: 20px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .local-file-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .local-file-btn svg {
            width: 24px;
            height: 24px;
            color: var(--fg-muted);
        }

        .local-file-btn span {
            font-size: 14px;
            color: var(--fg);
        }

        .selected-file {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--fg);
            display: none;
        }

        .selected-file.show {
            display: block;
        }

        .selected-file-path {
            font-family: 'JetBrains Mono', monospace;
            color: var(--fg-muted);
            word-break: break-all;
        }

        .url-input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--fg);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .url-input:focus {
            border-color: var(--accent);
        }

        .url-input::placeholder {
            color: var(--fg-muted);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Drag Overlay */
        .drag-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(14, 165, 233, 0.1);
            backdrop-filter: blur(8px);
            z-index: 150;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .drag-overlay.visible {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }

        .drag-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin: auto;
            padding: 48px;
            border: 3px dashed var(--accent);
            border-radius: 16px;
            background: var(--bg-secondary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .drag-content svg {
            width: 80px;
            height: 80px;
            color: var(--accent);
        }

        .drag-content p {
            font-size: 18px;
            font-weight: 500;
            color: var(--fg);
            margin: 0;
        }
    </style>
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="header-left">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="currentColor"
                      d="M20.56 18H3.44C2.65 18 2 17.37 2 16.59V7.41C2 6.63 2.65 6 3.44 6H20.56C21.35 6 22 6.63 22 7.41V16.59C22 17.37 21.35 18 20.56 18M3.44 6.94C3.18 6.94 2.96 7.15 2.96 7.41V16.6C2.96 16.85 3.18 17.06 3.44 17.06H20.56C20.82 17.06 21.04 16.85 21.04 16.6V7.41C21.04 7.15 20.82 6.94 20.56 6.94H3.44M4.89 15.19V8.81H6.81L8.73 11.16L10.65 8.81H12.58V15.19H10.65V11.53L8.73 13.88L6.81 11.53V15.19H4.89M16.9 15.19L14 12.09H15.94V8.81H17.86V12.09H19.79L16.9 15.19"/>
            </svg>
            MD Reader
        </div>
        <div class="file-group">
            <button class="open-file-btn" id="openFileBtn" title="打开文件" aria-label="打开文件">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="btn-text">打开文件</span>
            </button>
            <div class="file-path" id="filePath" style="display: none;"></div>
            <a class="download-btn" id="downloadBtn" title="下载 Markdown 文件" aria-label="下载 Markdown 文件"
               style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7,10 12,15 17,10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </a>
        </div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="tocToggle" title="切换目录" aria-label="切换目录">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="width-selector">
            <button class="width-btn" id="widthToggle" title="阅读宽度" aria-label="阅读宽度">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                </svg>
            </button>
            <div class="width-dropdown" id="widthDropdown">
                <div class="width-option" data-width="narrow">
                    <div class="icon narrow"><span></span></div>
                    <span class="label">较窄</span>
                </div>
                <div class="width-option" data-width="medium">
                    <div class="icon medium"><span></span></div>
                    <span class="label">适中</span>
                </div>
                <div class="width-option" data-width="wide">
                    <div class="icon wide"><span></span></div>
                    <span class="label">较宽</span>
                </div>
                <div class="width-option" data-width="wider">
                    <div class="icon wider"><span></span></div>
                    <span class="label">更宽</span>
                </div>
                <div class="width-option" data-width="full">
                    <div class="icon full"><span></span></div>
                    <span class="label">全屏</span>
                </div>
            </div>
        </div>
        <button class="icon-btn" id="themeToggle" title="切换主题" aria-label="切换深色模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" class="sun-icon">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" class="moon-icon" style="display:none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</header>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- TOC Overlay -->
<div class="toc-overlay" id="tocOverlay"></div>

<!-- Layout -->
<div class="layout">
    <!-- TOC Sidebar -->
    <nav class="toc-sidebar" id="tocSidebar" aria-label="目录">
        <div class="toc-title">页面导航</div>
        <ul class="toc-list" id="tocList"></ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <article class="article" id="article"></article>
    </main>
</div>

<!-- Back to Top -->
<button class="back-to-top" id="backToTop" aria-label="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round">
        <polyline points="18,15 12,9 6,15"/>
    </svg>
</button>

<!-- Drag Overlay -->
<div class="drag-overlay" id="dragOverlay">
    <div class="drag-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17,8 12,3 7,8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>拖拽 Markdown 文件到这里</p>
    </div>
</div>

<!-- URL Input Modal -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="urlModal">
    <div class="modal-header">
        <h3 class="modal-title">打开文件</h3>
        <button class="modal-close" id="modalClose" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    <div class="modal-body">
        <div class="file-tabs">
            <div class="file-tab active" data-tab="local">本地文件</div>
            <div class="file-tab" data-tab="remote">远程地址</div>
        </div>
        <div class="file-tab-content active" id="localTab">
            <button class="local-file-btn" id="localFileBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17,8 12,3 7,8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>选择文件</span>
            </button>
            <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display: none;">
            <div class="selected-file" id="selectedFile">
                <div class="selected-file-path" id="selectedFilePath"></div>
            </div>
        </div>
        <div class="file-tab-content" id="remoteTab">
            <input type="text" id="urlInput" class="url-input" placeholder="例如: https://example.com/file.md">
        </div>
    </div>
    <div class="modal-buttons">
        <button class="btn btn-secondary" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalConfirm">打开</button>
    </div>
</div>

<script>
    // ============ DOM Elements ============
    const articleEl = document.getElementById('article');
    const tocListEl = document.getElementById('tocList');
    const filePathEl = document.getElementById('filePath');
    const openFileBtn = document.getElementById('openFileBtn');
    const progressBar = document.getElementById('progressBar');
    const tocSidebar = document.getElementById('tocSidebar');
    const tocOverlay = document.getElementById('tocOverlay');
    const mainContent = document.getElementById('mainContent');
    const backToTopBtn = document.getElementById('backToTop');
    const themeToggleBtn = document.getElementById('themeToggle');
    const tocToggleBtn = document.getElementById('tocToggle');
    const downloadBtn = document.getElementById('downloadBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const urlModal = document.getElementById('urlModal');
    const modalClose = document.getElementById('modalClose');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    const urlInput = document.getElementById('urlInput');
    const dragOverlay = document.getElementById('dragOverlay');
    const fileTabs = document.querySelectorAll('.file-tab');
    const fileTabContents = document.querySelectorAll('.file-tab-content');
    const localFileBtn = document.getElementById('localFileBtn');
    const fileInput = document.getElementById('fileInput');
    const selectedFile = document.getElementById('selectedFile');
    const selectedFilePath = document.getElementById('selectedFilePath');
    let currentMarkdownContent = '';
    let currentFilename = '';
    let isDragOver = false;
    let selectedLocalFile = null;

    // ============ Width Selector ============
    const widthToggleBtn = document.getElementById('widthToggle');
    const widthDropdown = document.getElementById('widthDropdown');
    const widthOptions = document.querySelectorAll('.width-option');

    // Toggle dropdown
    widthToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        widthDropdown.classList.toggle('show');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.width-selector')) {
            widthDropdown.classList.remove('show');
        }
    });

    // Handle width selection
    widthOptions.forEach(option => {
        option.addEventListener('click', () => {
            const width = option.dataset.width;

            // Remove all width classes
            articleEl.classList.remove('width-narrow', 'width-medium', 'width-wide', 'width-wider', 'width-full');

            // Add selected width class
            articleEl.classList.add(`width-${width}`);

            // Update active state
            widthOptions.forEach(opt => opt.classList.remove('active'));
            option.classList.add('active');

            // Save preference
            localStorage.setItem('readerWidth', width);
        });
    });

    // Load saved width preference
    const savedWidth = localStorage.getItem('readerWidth') || 'medium';
    articleEl.classList.add(`width-${savedWidth}`);
    document.querySelector(`.width-option[data-width="${savedWidth}"]`)?.classList.add('active');

    // ============ Drag & Drop ============
    // Prevent default drag behavior
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    // Show drag overlay
    ['dragenter', 'dragover'].forEach(eventName => {
        document.body.addEventListener(eventName, highlight, false);
    });

    // Hide drag overlay
    ['dragleave', 'drop'].forEach(eventName => {
        document.body.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
        if (!isDragOver) {
            isDragOver = true;
            dragOverlay.classList.add('visible');
        }
    }

    function unhighlight(e) {
        // Only hide if leaving the window or after drop
        if (e.type === 'drop' || (e.relatedTarget === null && e.clientX === 0 && e.clientY === 0)) {
            isDragOver = false;
            dragOverlay.classList.remove('visible');
        }
    }

    // Handle drop
    document.body.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files.length > 0) {
            const file = files[0];
            handleFile(file);
        }

        isDragOver = false;
        dragOverlay.classList.remove('visible');
    }

    function handleFile(file) {
        // Check if file is markdown
        const markdownExtensions = ['.md', '.markdown', '.mkd', '.mdown', '.mkdn', '.mdwn', '.mdtxt', '.mdtext', '.text'];
        const fileName = file.name.toLowerCase();
        const isMarkdown = markdownExtensions.some(ext => fileName.endsWith(ext));

        if (!isMarkdown) {
            // Check content type as fallback
            if (file.type && !file.type.startsWith('text/')) {
                alert('请拖拽 Markdown 文件（.md, .markdown 等）');
                return;
            }
        }

        // Read file
        const reader = new FileReader();
        reader.onload = function (e) {
            const content = e.target.result;
            renderMarkdown(content, file.name, null);
        };
        reader.onerror = function () {
            alert('读取文件失败');
        };
        reader.readAsText(file);
    }

    // ============ Modal ============
    window.openModal = function () {
        modalOverlay.classList.add('visible');
        urlModal.classList.add('visible');
        // Reset to local tab
        fileTabs.forEach(tab => tab.classList.remove('active'));
        fileTabs[0].classList.add('active');
        fileTabContents.forEach(content => content.classList.remove('active'));
        fileTabContents[0].classList.add('active');
        // Clear selections
        selectedLocalFile = null;
        selectedFile.classList.remove('show');
        urlInput.value = '';
    };

    function closeModal() {
        modalOverlay.classList.remove('visible');
        urlModal.classList.remove('visible');
        selectedLocalFile = null;
        selectedFile.classList.remove('show');
        urlInput.value = '';
    }

    // Tab switching
    fileTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const tabType = tab.dataset.tab;
            fileTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            fileTabContents.forEach(content => content.classList.remove('active'));
            if (tabType === 'local') {
                document.getElementById('localTab').classList.add('active');
            } else {
                document.getElementById('remoteTab').classList.add('active');
                urlInput.focus();
            }
        });
    });

    // Local file selection
    localFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            selectedLocalFile = file;
            // Try to get file path (webkitRelativePath may work in some browsers)
            selectedFilePath.textContent = file.webkitRelativePath || file.name;
            selectedFile.classList.add('show');
        }
    });

    openFileBtn.addEventListener('click', () => {
        window.openModal();
    });

    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
        } else if (e.key === 'Enter') {
            modalConfirm.click();
        }
    });

    modalConfirm.addEventListener('click', () => {
        const activeTab = document.querySelector('.file-tab.active').dataset.tab;
        if (activeTab === 'local') {
            if (selectedLocalFile) {
                const fileToHandle = selectedLocalFile;
                closeModal();
                handleFile(fileToHandle);
            }
        } else {
            const url = urlInput.value.trim();
            if (url) {
                closeModal();
                loadMarkdown(url);
            }
        }
    });

    // ============ Theme ============
    const sunIcon = themeToggleBtn.querySelector('.sun-icon');
    const moonIcon = themeToggleBtn.querySelector('.moon-icon');

    function setTheme(isDark) {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        sunIcon.style.display = isDark ? 'none' : 'block';
        moonIcon.style.display = isDark ? 'block' : 'none';

        // Update highlight.js theme
        const hljsTheme = document.getElementById('hljs-theme');
        hljsTheme.href = isDark
            ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css'
            : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css';

        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Initialize theme
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(savedTheme ? savedTheme === 'dark' : prefersDark);

    themeToggleBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setTheme(!isDark);
    });

    // ============ TOC Toggle ============
    function toggleTOC() {
        const isMobile = window.innerWidth <= 1024;

        if (isMobile) {
            // Mobile: toggle open class
            tocSidebar.classList.toggle('open');
            tocOverlay.classList.toggle('visible');
        } else {
            // Desktop: toggle hidden class and adjust main content
            tocSidebar.classList.toggle('hidden');
            mainContent.classList.toggle('full-width');
        }
    }

    tocToggleBtn.addEventListener('click', toggleTOC);
    tocOverlay.addEventListener('click', toggleTOC);

    // ============ Progress Bar & Back to Top ============
    function updateProgress() {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        progressBar.style.width = progress + '%';

        // Back to top visibility
        if (scrollTop > 400) {
            backToTopBtn.classList.add('visible');
        } else {
            backToTopBtn.classList.remove('visible');
        }
    }

    window.addEventListener('scroll', updateProgress, {passive: true});

    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({top: 0, behavior: 'smooth'});
    });

    // ============ Active TOC Link ============
    const observerOptions = {
        rootMargin: '-20% 0px -70% 0px',
        threshold: 0
    };

    let headingElements = [];
    let tocLinks = [];

    const headingObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.id;
                tocLinks.forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === '#' + id);
                });
            }
        });
    }, observerOptions);

    function observeHeadings() {
        headingElements = articleEl.querySelectorAll('h1[id], h2[id], h3[id], h4[id]');
        headingElements.forEach(h => headingObserver.observe(h));
    }

    // ============ Markdown Rendering ============
    function renderMarkdown(content, filename, originalPath) {
        // Configure marked
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, {language: lang}).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Custom renderer for headings (add id)
        const renderer = new marked.Renderer();
        renderer.heading = function (data) {
            const text = this.parser.parseInline(data.tokens);
            const slug = text
                .toLowerCase()
                .replace(/[^\w\u4e00-\u9fa5]+/g, '-')
                .replace(/^-+|-+$/g, '');
            return `<h${data.depth} id="${slug}">${text}</h${data.depth}>\n`;
        };

        marked.use({renderer});

        // Parse markdown
        articleEl.innerHTML = marked.parse(content);

        // Generate TOC
        generateTOC();

        // Observe headings for active TOC
        observeHeadings();

        // Save content for download
        currentMarkdownContent = content;
        currentFilename = filename.split('/').pop();

        // Update file path display
        filePathEl.textContent = filename;
        filePathEl.style.display = 'block';
        openFileBtn.classList.add('icon-only');
        document.title = currentFilename + ' - MD Reader';

        // Show download button for all files
        downloadBtn.style.display = 'flex';

        // Add has-file class to file-group
        document.querySelector('.file-group').classList.add('has-file');
    }

    // ============ Download ============
    downloadBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentMarkdownContent) {
            const blob = new Blob([currentMarkdownContent], {type: 'text/markdown;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Clean up after download
            setTimeout(() => {
                URL.revokeObjectURL(url);
            }, 100);
        }
    });

    function generateTOC() {
        const headings = articleEl.querySelectorAll('h1, h2, h3, h4');
        tocListEl.innerHTML = '';
        tocLinks = [];

        headings.forEach(heading => {
            const level = parseInt(heading.tagName[1]);
            const text = heading.textContent;
            const id = heading.id || text.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-');

            if (!heading.id) heading.id = id;

            const li = document.createElement('li');
            li.className = 'toc-item';

            const a = document.createElement('a');
            a.className = 'toc-link';
            a.href = '#' + id;
            a.textContent = text;
            a.setAttribute('data-level', level);

            a.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById(id).scrollIntoView({behavior: 'smooth'});

                // Close TOC on mobile
                if (window.innerWidth <= 1024) {
                    toggleTOC();
                }
            });

            tocLinks.push(a);
            li.appendChild(a);
            tocListEl.appendChild(li);
        });
    }

    // ============ Fetch Markdown ============
    async function loadMarkdown(filepath) {
        articleEl.innerHTML = `
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <div class="loading-text">正在加载 ${filepath}...</div>
        </div>
      `;

        try {
            // Check if URL is http/https, use proxy to avoid CORS
            let fetchUrl = filepath;
            if (filepath.startsWith('http://') || filepath.startsWith('https://')) {
                fetchUrl = `/proxy?url=${filepath}`;
            }

            const response = await fetch(fetchUrl);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const content = await response.text();
            renderMarkdown(content, filepath, filepath);

        } catch (error) {
            articleEl.innerHTML = `
          <div class="error-container">
            <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div class="error-title">加载文档失败</div>
            <div style="color: var(--fg-muted);">无法获取 Markdown 文件。</div>
            <div class="error-message">${error.message}</div>
          </div>
        `;
        }
    }

    // ============ URL Parameter Parsing ============
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // ============ Initialize ============
    function init() {
        const filepath = getQueryParam('file');

        // Hide download button initially
        downloadBtn.style.display = 'none';

        // Remove has-file class initially
        document.querySelector('.file-group').classList.remove('has-file');

        if (filepath) {
            loadMarkdown(filepath);
        } else {
            articleEl.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
              <polyline points="14,2 14,8 20,8"/>
              <text x="12" y="16" text-anchor="middle" dominant-baseline="middle" font-size="6" font-weight="600" fill="currentColor" stroke="none">MD</text>
            </svg>
            <div class="empty-title">未选择文档</div>
            <div class="empty-desc">在 URL 中添加 <code>?file=文档路径.md</code> 或 <code>?file=https://example.com/file.md</code> 来查看 Markdown 文件。
                    <br><br>或点击左上角的「打开文件」打开本地或远程文件，或直接拖拽 Markdown 文件到页面。</div>
            <a href="?file=README.md" class="example-link">
                查看示例
            </a>
          </div>
        `;
            filePathEl.textContent = '请选择文件';
            filePathEl.classList.add('clickable');
        }
    }

    init();
</script>
</body>
</html>
